name: Update Tweets

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  update-tweets:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Run Apify Twitter List Scraper
        run: |
          RUN_RESPONSE=$(curl -s -X POST \
            "https://api.apify.com/v2/acts/gentle_cloud~twitter-tweets-scraper/runs?token=${{ secrets.APIFY_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"listIds": ["4510882"], "maxTweets": 20}')
          RUN_ID=$(echo "$RUN_RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['data']['id'])")
          echo "Run ID: $RUN_ID"
          for i in $(seq 1 30); do
            sleep 10
            STATUS=$(curl -s "https://api.apify.com/v2/actor-runs/$RUN_ID?token=${{ secrets.APIFY_API_TOKEN }}" \
              | python3 -c "import sys,json; print(json.load(sys.stdin)['data']['status'])")
            echo "Status ($i): $STATUS"
            if [ "$STATUS" = "SUCCEEDED" ]; then break
            elif [ "$STATUS" = "FAILED" ] || [ "$STATUS" = "ABORTED" ] || [ "$STATUS" = "TIMED-OUT" ]; then exit 1
            fi
          done
          DATASET_ID=$(curl -s "https://api.apify.com/v2/actor-runs/$RUN_ID?token=${{ secrets.APIFY_API_TOKEN }}" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['data']['defaultDatasetId'])")
          curl -s "https://api.apify.com/v2/datasets/$DATASET_ID/items?token=${{ secrets.APIFY_API_TOKEN }}&format=json&clean=true" -o raw_tweets.json
          python3 -c "import json; print(f'Got {len(json.load(open(\"raw_tweets.json\")))} tweets')"

      - name: Normalize tweets to tweets.json
        run: |
          python3 - << 'EOF'
          import json
          raw = json.load(open("raw_tweets.json"))
          tweets = []
          for t in raw[:20]:
              legacy = t.get('user', {}).get('legacy', {})
              author = legacy.get('screen_name') or t.get('user_id_str') or 'unknown'
              tweets.append({
                  'author':      author,
                  'displayName': legacy.get('name') or author,
                  'text':        t.get('full_text') or t.get('text') or '',
                  'createdAt':   t.get('created_at') or '',
                  'url':         t.get('url') or f"https://x.com/{author}/status/{t.get('id_str','')}",
              })
          json.dump(tweets, open('tweets.json','w'), indent=2)
          print(f'Wrote {len(tweets)} tweets')
          EOF

      - name: Commit tweets.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tweets.json
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "chore: update tweets.json [skip ci]"
            git push
          fi
