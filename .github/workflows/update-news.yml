name: Update News

on:
  schedule:
    - cron: '*/20 * * * *'
  workflow_dispatch:

jobs:
  update-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Python dependencies
        run: |
          python3 -m pip install --quiet requests beautifulsoup4

      - name: Scrape latest Mets news
        run: |
          python3 - <<'PY'
          import json
          import requests
          from bs4 import BeautifulSoup

          url = 'https://www.mlb.com/mets/news'
          response = requests.get(url, timeout=30, headers={
              'User-Agent': 'github-actions/1.0',
              'Accept': 'text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8',
          })
          response.raise_for_status()

          soup = BeautifulSoup(response.text, 'html.parser')
          articles = []

          for art in soup.find_all('article', class_='article-item'):
              headline = art.find('h1', class_='article-item__headline')
              link = art.find('a', class_='p-button__link')
              if not headline or not link:
                  continue
              title = headline.get_text(strip=True)
              href = link.get('href', '').strip()
              if href.startswith('/'):
                  href = 'https://www.mlb.com' + href
              if title and href:
                  articles.append({
                      'source': 'MLB.com',
                      'title': title,
                      'url': href,
                  })
              if len(articles) >= 5:
                  break

          if not articles:
              raise SystemExit('No news articles were found on MLB.com')

          with open('news.json', 'w', encoding='utf-8') as f:
              json.dump(articles, f, indent=2, ensure_ascii=False)

          print(f'Wrote {len(articles)} news items to news.json')
          PY

      - name: Commit news.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add news.json
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "chore: update news.json [skip ci]"
            git push
          fi
